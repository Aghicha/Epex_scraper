name: Scrape EPEX market results

on:
  schedule:
    # Every 15 minutes. EPEX enforces a strict per-IP limit — only a handful
    # of requests before sustained throttling that doesn't clear within one
    # run. The scraper retries a throttled combo until it succeeds rather
    # than skipping it (see README "Rate-limiting"), so a run can take a
    # while if the limit is genuinely stuck — see the job `timeout-minutes`
    # below for what happens then, and set an EPEX_PROXIES secret if that's
    # a recurring problem. `concurrency` below means a slow run just delays
    # (not doubles-up-with) the next scheduled one.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "Delivery days before today to fetch"
        required: false
        default: "1"
      days_forward:
        description: "Delivery days after today to fetch"
        required: false
        default: "1"

# Never let two scrape runs overwrite each other's commit.
concurrency:
  group: epex-scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    # A throttled combo is retried until it succeeds, never skipped, so a
    # sustained/unresolvable block can make a run take a long time — there is
    # no self-imposed cap. This timeout is the outer safety net: if it fires,
    # the job is killed before the "Commit new data" step runs, so that run's
    # writes are lost (previously committed data is unaffected, and the next
    # scheduled run just retries). Configure EPEX_PROXIES (see the Scrape
    # step below) if this starts firing regularly.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape
        # If EPEX 403s from the Actions runner (datacenter IPs are often WAF-
        # blocked) or throttling keeps stopping runs early, add an
        # EPEX_PROXIES repo secret — a comma-separated list of proxy URLs —
        # and uncomment the env line below. The scraper round-robins one
        # proxy per request (see client.ProxyRotator), so no single egress IP
        # ever sees enough traffic to trip the per-IP rate limit.
        # env:
        #   EPEX_PROXIES: ${{ secrets.EPEX_PROXIES }}
        run: |
          python -m epex_scraper.scrape \
            --data-dir data \
            --days-back "${{ github.event.inputs.days_back || '1' }}" \
            --days-forward "${{ github.event.inputs.days_forward || '1' }}"

      - name: Commit new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new or changed data — nothing to commit."
            exit 0
          fi
          git commit -m "data: EPEX market results $(date -u +%Y-%m-%d)"
          # Rebase onto any concurrent commits before pushing.
          for attempt in 1 2 3 4; do
            if git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push failed (attempt $attempt) — pulling --rebase and retrying."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            sleep $((2 ** attempt))
          done
          echo "Failed to push after retries." >&2
          exit 1
