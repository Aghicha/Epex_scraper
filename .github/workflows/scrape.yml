name: Scrape EPEX market results

on:
  schedule:
    # Daily at 22:00 UTC. Day-ahead auction results for the next delivery day
    # publish around midday CET; running late in the day also lets the rolling
    # 3-day window pick up finalised intraday data for the current day.
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      days_back:
        description: "Delivery days before today to fetch"
        required: false
        default: "2"
      days_forward:
        description: "Delivery days after today to fetch"
        required: false
        default: "2"

# Never let two scrape runs overwrite each other's commit.
concurrency:
  group: epex-scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape
        # If EPEX 403s from the Actions runner (datacenter IPs are often WAF-
        # blocked), add an EPEX_PROXY repo secret (e.g. a residential proxy URL)
        # and uncomment the env block below to route requests through it.
        # env:
        #   HTTPS_PROXY: ${{ secrets.EPEX_PROXY }}
        #   HTTP_PROXY: ${{ secrets.EPEX_PROXY }}
        run: |
          python -m epex_scraper.scrape \
            --data-dir data \
            --days-back "${{ github.event.inputs.days_back || '2' }}" \
            --days-forward "${{ github.event.inputs.days_forward || '2' }}"

      - name: Commit new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new or changed data — nothing to commit."
            exit 0
          fi
          git commit -m "data: EPEX market results $(date -u +%Y-%m-%d)"
          # Rebase onto any concurrent commits before pushing.
          for attempt in 1 2 3 4; do
            if git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push failed (attempt $attempt) — pulling --rebase and retrying."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            sleep $((2 ** attempt))
          done
          echo "Failed to push after retries." >&2
          exit 1
